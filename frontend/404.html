<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Halaman Tidak Ditemukan</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
      }
      
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      
      .container {
        text-align: center;
        max-width: 600px;
      }
      
      h1 {
        font-size: clamp(2rem, 5vw, 4rem);
        color: #1e293b;
        margin-bottom: 1rem;
      }
      
      p {
        font-size: clamp(1rem, 2vw, 1.25rem);
        color: #64748b;
        margin-bottom: 2rem;
      }
      
      a {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        color: white;
        text-decoration: none;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      
      a:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(30, 41, 59, 0.2);
      }
      
      a:active {
        transform: translateY(0);
      }
      
      .emoji {
        font-size: clamp(3rem, 10vw, 6rem);
        margin-bottom: 1rem;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <span class="emoji">🔍</span>
      <h1>404</h1>
      <p>Halaman yang Anda cari tidak ditemukan.</p>
      <p style="margin-bottom: 2rem; font-size: clamp(0.875rem, 1.5vw, 1rem);">Kembalilah ke halaman utama untuk melanjutkan klasifikasi batik Anda.</p>
      <a href="/">← Kembali ke Halaman Utama</a>
    </div>
    
    <!-- Redirect to index for SPA -->
    <script>
      // If this page is accessed, redirect to home and let React Router handle the routing
      window.location.href = '/#' + window.location.pathname;
    </script>
  </body>
</html>
